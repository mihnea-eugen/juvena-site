<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1C1B2E"/>
  <!-- Gold accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="#C49A3C"/>
  <!-- Subtle grid pattern -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#grid)" opacity="0.05"/>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#FAF8F5" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Logo text -->
  <text x="600" y="240" font-family="Georgia, serif" font-size="80" font-weight="300" fill="#FAF8F5" text-anchor="middle" letter-spacing="12">JUVENA</text>
  <!-- Gold line separator -->
  <rect x="480" y="270" width="240" height="1" fill="#C49A3C"/>
  <!-- Subtitle -->
  <text x="600" y="320" font-family="Georgia, serif" font-size="22" font-weight="300" fill="#C49A3C" text-anchor="middle" letter-spacing="4">CLINICĂ DERMATOLOGIE ESTETICĂ</text>
  <!-- City -->
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="16" font-weight="300" fill="#FAF8F5" text-anchor="middle" letter-spacing="2" opacity="0.7">TIMIȘOARA</text>
  <!-- Website -->
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="18" fill="#C49A3C" text-anchor="middle" opacity="0.8">juvena-timisoara.ro</text>
  <!-- Gold accent line bottom -->
  <rect x="0" y="626" width="1200" height="4" fill="#C49A3C"/>
</svg>
